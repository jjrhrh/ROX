<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Cinema-ROX Admin</title>
<style>
  body { background:#0a0a0a; color:#fff; font-family:Cairo,sans-serif; padding:20px; }
  h1 { color:#9333ea; }
  input { width:100%; padding:10px; margin:8px 0; background:#1a1a1a; border:1px solid #9333ea; color:#fff; border-radius:8px; }
  button { background:#9333ea; color:#fff; border:none; padding:12px 24px; border-radius:8px; cursor:pointer; width:100%; margin-top:8px; }
  .status { margin-top:12px; padding:10px; border-radius:8px; background:#1a1a1a; }
  .file-card { background:#1a1a1a; border:1px solid #9333ea33; border-radius:8px; padding:12px; margin:8px 0; display:flex; gap:12px; align-items:center; }
  .file-card img { width:80px; height:50px; object-fit:cover; border-radius:6px; }
</style>
</head>
<body>
<h1>🎬 Cinema-ROX Admin</h1>

<h3>رفع فيديو برابط</h3>
<input id="videoUrl" placeholder="https://رابط-الفيديو-المباشر" />
<input id="videoTitle" placeholder="عنوان الفيديو" />
<button onclick="uploadVideo()">⬆️ رفع على Filemoon</button>
<div class="status" id="uploadStatus">في انتظار الرفع...</div>

<h3 style="margin-top:24px">📁 ملفاتي على Filemoon</h3>
<button onclick="loadMyFiles()" style="background:#1a1a1a; border:1px solid #9333ea">🔄 تحديث القائمة</button>
<div id="filesList"></div>

<script>
const FM_KEY = '123298s5edxhw6cbv44pzc';
const FM_API = 'https://api.byse.sx';

async function uploadVideo() {
  const url   = document.getElementById('videoUrl').value.trim();
  const title = document.getElementById('videoTitle').value.trim();
  const status = document.getElementById('uploadStatus');
  if (!url) { status.textContent = '⚠️ أدخل رابط الفيديو'; return; }
  status.textContent = '⏳ جاري إرسال أمر الرفع...';
  try {
    const res = await fetch(`${FM_API}/upload/url?key=${FM_KEY}&url=${encodeURIComponent(url)}&title=${encodeURIComponent(title||'video')}`);
    const data = await res.json();
    if (data.status === 200) {
      status.innerHTML = `✅ تم إرسال أمر الرفع!<br>كود الملف: <b>${data.result?.filecode||'...'}</b>`;
      checkStatus(data.result?.filecode);
    } else {
      status.textContent = '❌ فشل: ' + (data.msg || 'خطأ غير معروف');
    }
  } catch(e) { status.textContent = '❌ خطأ: ' + e.message; }
}

async function checkStatus(code) {
  if (!code) return;
  const status = document.getElementById('uploadStatus');
  const interval = setInterval(async () => {
    try {
      const res = await fetch(`${FM_API}/encoding/status?key=${FM_KEY}&file_code=${code}`);
      const data = await res.json();
      const s = data.result?.status;
      status.innerHTML += `<br>حالة الرفع: <b>${s}</b> - ${data.result?.progress||0}%`;
      if (s === 'OK' || s === 'ok') clearInterval(interval);
    } catch { clearInterval(interval); }
  }, 5000);
}

async function loadMyFiles() {
  const list = document.getElementById('filesList');
  list.innerHTML = '⏳ جاري التحميل...';
  try {
    const res = await fetch(`${FM_API}/file/list?key=${FM_KEY}`);
    const data = await res.json();
    const files = data.result?.files || [];
    if (!files.length) { list.innerHTML = '<p>لا توجد ملفات</p>'; return; }
    list.innerHTML = files.map(f => `
      <div class="file-card">
        <img src="${f.thumbnail||''}" onerror="this.style.display='none'">
        <div>
          <div><b>${f.name||f.title||f.file_code}</b></div>
          <div style="font-size:.8rem;color:#aaa">${f.file_code}</div>
          <div style="font-size:.8rem;color:#9333ea">
            Embed: https://filemoon.sx/e/${f.file_code}
          </div>
        </div>
      </div>`).join('');
  } catch(e) { list.innerHTML = '❌ خطأ: ' + e.message; }
}

loadMyFiles();
</script>
</body>
</html>
