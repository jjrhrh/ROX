name: Cinema-ROX Auto Update
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python bot.py
        env:
          TMDB_KEY: ${{ secrets.TMDB_KEY }}
      - run: |
          git config user.name "Cinema-ROX Bot"
          git config user.email "bot@cinema-rox.com"
          git add data.json
          git diff --staged --quiet || git commit -m "🤖 تحديث تلقائي"
          git push
