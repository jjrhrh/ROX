<div id="heroSection" class="hero-section">

  <div class="hero-logo">Cinema <span>ROX</span></div>
<!-- TOP-LEFT: HAMBURGER + NOTIFICATION BELL -->
<div class="hero-topbar-left">

    <span></span><span></span><span></span>
  </button>

  </button>
</div>

<div id="searchPage" class="page">

    <!-- شريط البحث + زر الفلتر -->
    <div class="search-bar-row">
      <div class="search-input-wrap">

        <input type="text" id="searchInput2" class="search-input-page"

      </div>
      <select id="searchTypeSelect" class="search-type-select" onchange="onTypeChange()">

        <option value="movie">أفلام</option>
        <option value="tv">مسلسلات</option>
        <option value="anime">أنمي</option>
      </select>
      <button class="search-filter-btn" onclick="toggleAdvFilter()" id="filterToggleBtn">

      </button>
    </div>

    <!-- الفلاتر الأساسية -->
    <div class="search-filters-row" id="searchFiltersRow">
      <div class="filter-group">
        <label class="filter-label">التصنيف</label>
        <select id="filterGenre" class="filter-select" onchange="applyAdvFilter()">
          <option value="">الكل</option>
          <option value="28">أكشن</option>
          <option value="12">مغامرة</option>
          <option value="16">أنيميشن</option>
          <option value="35">كوميدي</option>
          <option value="80">جريمة</option>
          <option value="99">وثائقي</option>
          <option value="18">دراما</option>
          <option value="10751">عائلي</option>
          <option value="14">فانتازيا</option>
          <option value="36">تاريخي</option>
          <option value="27">رعب</option>
          <option value="10402">موسيقى</option>
          <option value="9648">غموض</option>
          <option value="10749">رومانسي</option>
          <option value="878">خيال علمي</option>
          <option value="10770">تلفزيوني</option>
          <option value="53">إثارة</option>
          <option value="10752">حرب</option>
          <option value="37">وسترن</option>
        </select>
      </div>
      <div class="filter-group">
        <label class="filter-label">السنة</label>
        <select id="filterYear" class="filter-select" onchange="applyAdvFilter()">
          <option value="">الكل</option>
        </select>
      </div>
      <div class="filter-group">
        <label class="filter-label">الترتيب</label>
        <select id="filterSort" class="filter-select" onchange="applyAdvFilter()">
          <option value="popularity.desc">الأكثر شعبية</option>
          <option value="vote_average.desc">الأعلى تقييماً</option>
          <option value="release_date.desc">الأحدث</option>
          <option value="revenue.desc">الأعلى إيراداً</option>
        </select>
      </div>
      <div class="filter-group">
        <label class="filter-label">البلد</label>
        <select id="filterCountry" class="filter-select" onchange="applyAdvFilter()">
          <option value="">الكل</option>
          <option value="US">أمريكا</option>
          <option value="GB">بريطانيا</option>
          <option value="JP">اليابان</option>
          <option value="KR">كوريا الجنوبية</option>
          <option value="FR">فرنسا</option>
          <option value="DE">ألمانيا</option>
          <option value="IN">الهند</option>

          <option value="MX">المكسيك</option>
          <option value="CN">الصين</option>
          <option value="TH">تايلاند</option>
        </select>
      </div>
    </div>
