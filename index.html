<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlRoot">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#050505">
  <meta name="description" content="Cinema ROX — أفلام ومسلسلات بمستوى أسطوري">
  <title>Cinema ROX</title>
  <link rel="icon" href="logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
</head>
<body>

<!-- HERO -->
<div id="heroSection" class="hero-section">
  <div class="hero-backdrop" id="heroBackdrop"></div>
  <div class="hero-gradient"></div>
  <div class="hero-logo">Cinema <span>ROX</span></div>

  <div class="swiper hero-swiper" id="heroSwiper" dir="ltr">
    <div class="swiper-wrapper" id="heroSwiperWrapper">
      <!-- slides injected by JS -->
    </div>
  </div>

  <div class="hero-info-container" id="hero-info-area">
  <div class="hero-trending-badge">🔥 الأكثر مشاهدة</div>
  <div class="hero-info-year"  id="heroInfoYear"></div>
  <div class="hero-info-title" id="heroInfoTitle"></div>
  <div class="hero-info-caps"  id="heroInfoGenres"></div>
</div>

</div>
<!-- PAGES -->
  <div id="studioBar" class="studio-bar" style="display:none">
  <div class="studio-title">🎌 استوديوهات أسطورية</div>
  <div class="studio-list">
    <div class="studio-chip" onclick="openStudio('MAPPA',9737)">MAPPA</div>
<div class="studio-chip" onclick="openStudio('Ufotable',6482)">Ufotable</div>
<div class="studio-chip" onclick="openStudio('Toei Animation',2653)">Toei</div>
<div class="studio-chip" onclick="openStudio('Madhouse',7451)">Madhouse</div>
<div class="studio-chip" onclick="openStudio('Bones',3931)">Bones</div>
<div class="studio-chip" onclick="openStudio('A-1 Pictures',3575)">A-1 Pictures</div>
  </div>
  </div>
<div id="homePage" class="page"></div>
<div id="newsSection" class="news-section" style="display:none; order:99">
  <div class="section-header">
    <span class="section-bar"></span>
    <h2 class="section-title" id="newsSectionTitle">📰 أخبار السينما الحية</h2>
  </div>
  <div id="newsFeed" class="news-feed"></div>
</div>
<div id="searchPage"     class="page">
  <div class="search-header">
    <input type="text" id="searchInput2" class="search-input-page"
      placeholder="🔍 ابحث عن فيلم أو مسلسل..."
      oninput="handleSearch(this.value)">
  </div>
  <div id="searchResults"></div>
</div>
<div id="libraryPage"    class="page"></div>
<div id="profilePage"    class="page"></div>
<div id="detailPage"     class="page"></div>
<div id="watchPage" class="page"></div>
  <!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="bnav-btn" id="bnavHome" onclick="bnavGo('home')">
    <span class="bnav-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
    <span class="bnav-label">الرئيسية</span>
  </button>
  <button class="bnav-btn" id="bnavSearch" onclick="bnavGo('search')">
    <span class="bnav-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
    <span class="bnav-label">البحث</span>
  </button>
  <button class="bnav-btn bnav-center" id="bnavCenter" onclick="toggleRoxMenu()">
    <span class="bnav-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="17" y1="7" x2="22" y2="7"/></svg></span>
  </button>
  <button class="bnav-btn" id="bnavLibrary" onclick="bnavGo('library')">
    <span class="bnav-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></span>
    <span class="bnav-label">مكتبتي</span>
  </button>
  <button class="bnav-btn bnav-otaku" id="bnavOtaku" onclick="toggleOtakuMode()">
    <span class="bnav-icon otaku-pulse"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg></span>
    <span class="bnav-label">عالم الأوتاكو</span>
  </button>
  <button class="bnav-btn" id="bnavProfile" onclick="bnavGo('profile')">
    <span class="bnav-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
    <span class="bnav-label">حسابي</span>
  </button>
</nav>
<!-- ROX MENU -->
<div class="rox-overlay hidden" id="roxOverlay" onclick="toggleRoxMenu()"></div>
<div class="rox-menu hidden" id="roxMenu">
  <div class="rox-item" onclick="toggleRoxMenu();openMovieOfDay()">
    <div class="rox-circle" style="background:linear-gradient(135deg,#e50914,#8B0000);">🎥</div>
    <span class="rox-label">فيلم اليوم</span>
  </div>
  <div class="rox-item" onclick="toggleRoxMenu();openStats()">
    <div class="rox-circle" style="background:linear-gradient(135deg,#1a6cff,#0a3d8f);">📊</div>
    <span class="rox-label">إحصائياتي</span>
  </div>
  <div class="rox-item" onclick="toggleRoxMenu();openSurprise()">
    <div class="rox-circle" style="background:linear-gradient(135deg,#f5a623,#c47d0e);">🎲</div>
    <span class="rox-label">فاجئني</span>
  </div>
  <div class="rox-item" onclick="toggleRoxMenu();openAI()">
    <div class="rox-circle" style="background:linear-gradient(135deg,#1ce783,#0a8f4a);">🤖</div>
    <span class="rox-label">اختياري</span>
  </div>
</div>
</div>

<!-- TRAILER OVERLAY -->
<div class="trailer-overlay hidden" id="trailerOverlay">
  <div class="trailer-box">
    <button class="trailer-close" id="closeTrailer">✕</button>
    <iframe id="trailerFrame" class="trailer-frame"
      allowfullscreen allow="autoplay; encrypted-media">
    </iframe>
  </div>
</div>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script src="config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

    apiKey: "AIzaSyDD3v9wb5TJ-3KQfsEr__D5QnmbWow-4g0",

    projectId: "cinema-rox",
    storageBucket: "cinema-rox.firebasestorage.app",
    messagingSenderId: "515687717633",

  window.ROX_AUTH     = firebase.auth();
  window.ROX_PROVIDER = new firebase.auth.GoogleAuthProvider();

<script src="app.js"></script>
</body>
</html>
